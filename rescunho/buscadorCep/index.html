<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscador de CEP</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; }
        .painel { margin-top: 20px; padding: 20px; background: #f0f0f0; border-radius: 8px; }
        input { padding: 8px; font-size: 16px; width: 200px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    </style>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Consulta de Endereço</h1>
    
    <input type="number" id="input-cep" placeholder="Digite o CEP (só números)">
    <button id="btn-buscar">Buscar CEP</button>

    <div class="painel" id="resultado">
        <p>Aguardando consulta...</p>
    </div>
</body>
</html>
