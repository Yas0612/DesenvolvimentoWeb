<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Postagem</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background-color: #f4f4f9; }
        .formulario { 
            background: white; padding: 30px; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px;
        }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { 
            width: 100%; padding: 10px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; /* Evita que o input vaze a tela */
        }
        button { 
            width: 100%; padding: 12px; background-color: #28a745; 
            color: white; border: none; border-radius: 4px; 
            font-size: 16px; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        #mensagem { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="formulario">
        <h2>Criar Novo Post</h2>
        
        <div class="campo">
            <label for="titulo">Título do Post:</label>
            <input type="text" id="titulo" placeholder="Ex: Reunião do Lab">
        </div>

        <div class="campo">
            <label for="conteudo">Conteúdo:</label>
            <textarea id="conteudo" rows="4" placeholder="Escreva a mensagem aqui..."></textarea>
        </div>

        <button id="btn-enviar">Salvar no Servidor</button>

        <p id="mensagem"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
